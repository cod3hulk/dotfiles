# tmux-which-key configuration
# Minimal config: sessions / windows / panes management + Claude Code

command_alias_start_index: 200

keybindings:
  root_table: C-Space      # Ctrl-Space for instant access (no prefix needed)
  prefix_table: Space      # prefix+Space for traditional access

title:
  style: align=centre,bold
  prefix: tmux
  prefix_style: fg=#50fa7b,align=centre,bold  # Dracula green

position:
  x: C  # Center horizontally
  y: C  # Center vertically

custom_variables:
  - name: log_info
    value: '#[fg=#50fa7b,italics] [info]#[default]#[italics]'  # Dracula green

macros:
  - name: reload-config
    commands:
      - display "#{log_info} Reloading tmux config..."
      - source-file ~/.tmux.conf
      - display "#{log_info} Config reloaded!"

items:
  - name: +Sessions
    key: s
    menu:
      - name: Create
        key: c
        command: command-prompt -p "New session:" "new-session -s '%%'"
      - name: Kill
        key: x
        command: kill-session
      - name: Kill others
        key: m
        command: kill-session -a
      - name: Rename
        key: r
        command: run-shell "bash ~/.tmux/scripts/session-rename.sh"
      - name: Search
        key: s
        command: run-shell "bash ~/.tmux/scripts/session-search.sh"
  - name: +Windows
    key: w
    menu:
      - name: Create
        key: c
        command: 'new-window -c "#{pane_current_path}"'
      - name: Kill
        key: x
        command: kill-window
      - name: Kill others
        key: m
        command: kill-window -a
      - name: Rename
        key: r
        command: run-shell "bash ~/.tmux/scripts/window-rename.sh"
      - name: Search
        key: s
        command: run-shell "bash ~/.tmux/scripts/window-search.sh"
  - name: +Panes
    key: p
    menu:
      - name: Create
        key: c
        command: 'splitw -h -c "#{pane_current_path}"'
      - name: Kill
        key: x
        command: kill-pane
      - name: Kill others
        key: m
        command: kill-pane -a
      - name: Rename
        key: r
        command: run-shell "bash ~/.tmux/scripts/pane-rename.sh"
      - name: Search
        key: s
        command: run-shell "bash ~/.tmux/scripts/pane-search.sh"
  - separator: true
  - name: Claude Code
    key: g
    menu:
      - name: Claude popup
        key: g
        command: run-shell "bash ~/.tmux/scripts/claude-popup.sh #{pane_current_path}"
      - name: Agent picker
        key: s
        command: run-shell "bash ~/.tmux/scripts/agent-picker-popup.sh"
  - name: +Tmux
    key: t
    menu:
      - name: Reload config
        key: r
        macro: reload-config
      - separator: true
      - name: Install plugins
        key: i
        command: run-shell $TMUX_PLUGIN_MANAGER_PATH/tpm/bindings/install_plugins
      - name: Update plugins
        key: u
        command: run-shell $TMUX_PLUGIN_MANAGER_PATH/tpm/bindings/update_plugins
      - name: Clean plugins
        key: c
        command: run-shell $TMUX_PLUGIN_MANAGER_PATH/tpm/bindings/clean_plugins
