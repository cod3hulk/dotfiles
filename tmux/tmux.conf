# tmux configuration file
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm-256color:RGB"
set -g base-index 1
set -g pane-base-index 1

# --- general
set -sg escape-time 10
set -g focus-events on

set-window-option -g allow-rename off
set-window-option -g xterm-keys on
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Set window notifications
setw -g monitor-activity on
set -g visual-activity off

# set history limit
set-option -g history-limit 50000

# enable vi like navigation for copy-mode
setw -g mode-keys vi
# --- end general

set -g @copycat_hash_search 'C-h'
set -g @open-S 'https://www.google.com/search?q='


###########################
## Key bindings
############################
# change key or switching between current and last window
# unbind-key -a
bind-key -r l next-window
bind-key -r h previous-window
bind-key s display-popup -E -w 60% -h 40% "tmux list-windows -F '#{window_name}' | fzf | xargs -I {} tmux select-window -t {}"

# rebind pane splitting
unbind-key % #
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# rebind pane resizing
bind-key -r K resize-pane -U 5
bind-key -r J resize-pane -D 5
bind-key -r H resize-pane -L 5
bind-key -r L resize-pane -R 5

# change prefix key to 'a'
unbind C-b
set -g prefix C-a

# rebind copy-mode
unbind-key [
bind-key v copy-mode
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection

# rebind kill commands
unbind-key X
bind-key X confirm-before -p "kill-window #P? (y/n)" kill-window
unbind-key x
bind-key x confirm-before -p "kill-pane #P? (y/n)" kill-pane
unbind-key m
bind-key m run "tmux kill-pane -a -t #{pane_id}"

# always create a new window in the home dir
bind c new-window -c ~

# reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# session management
bind N new-session
bind S display-popup -E "tmux list-sessions -F '#{session_name}' | fzf | xargs tmux switch-client -t"

# --- end key bindings

###########################
## Plugins
############################
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
#set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'erikw/tmux-powerline'
set -g @plugin 'dracula/tmux'
set -g @plugin 'accessd/tmux-agent-indicator'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

# set -g @continuum-restore 'on'
# set -g @continuum-save-interval '10'
# set -g @resurrect-strategy-nvim 'session'
# set -g @resurrect-processes 'claude'

###########################
## Navigation
############################
# vim-tmux-navigator plugin handles C-h/j/k/l pane switching

# C-l for clearing screen (overridden by vim-tmux-navigator)
bind C-l send-keys 'C-l'


###########################
## mouse support - yeah... I know :/
############################
set -g mouse on

set -g pane-border-lines "double"

###########################################
# Status Bar (Managed by plugins)
###########################################
# tmux-powerline configuration
set -g @tmux_powerline_theme 'default'

# Dracula theme configuration
set -g @dracula-show-powerline true
set -g @dracula-show-left-icon session
set -g @dracula-plugins "cpu-usage ram-usage time"
set -g @dracula-show-timezone false
set -g @dracula-military-time true

# tmux-agent-indicator configuration
# Global toggles
set -g @agent-indicator-background-enabled 'on'
set -g @agent-indicator-border-enabled 'on'
set -g @agent-indicator-indicator-enabled 'on'

# Running state
set -g @agent-indicator-running-enabled 'on'
set -g @agent-indicator-running-bg 'default'
set -g @agent-indicator-running-border 'default'
set -g @agent-indicator-running-window-title-bg 'black'
set -g @agent-indicator-running-window-title-fg 'yellow'

# Needs-input state
set -g @agent-indicator-needs-input-enabled 'on'
set -g @agent-indicator-needs-input-bg 'default'
set -g @agent-indicator-needs-input-border 'yellow'
set -g @agent-indicator-needs-input-window-title-bg 'black'
set -g @agent-indicator-needs-input-window-title-fg 'red'

# Done state
set -g @agent-indicator-done-enabled 'on'
set -g @agent-indicator-done-bg 'default'
set -g @agent-indicator-done-border 'green'
set -g @agent-indicator-done-window-title-bg 'black'
set -g @agent-indicator-done-window-title-fg 'green'

# Additional settings
set -g @agent-indicator-icons 'claude=🤖,codex=🧠,opencode=💻,default=🤖'
set -g @agent-indicator-processes 'claude,codex,aider,cursor,opencode'
set -g @agent-indicator-reset-on-focus 'on'
set -g @agent-indicator-animation-enabled 'off'


###########################
## Plugin Manager
############################
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
