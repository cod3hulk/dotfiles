# tmux configuration file
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm-256color:RGB"
set -g base-index 1
set -g pane-base-index 1

# --- general
set -sg escape-time 10
set -g focus-events on

set-window-option -g allow-rename off
set-window-option -g xterm-keys on

# Set window notifications
setw -g monitor-activity on
set -g visual-activity off

# set history limit
set-option -g history-limit 50000

# enable vi like navigation for copy-mode
setw -g mode-keys vi
# --- end general

set -g @copycat_hash_search 'C-h'
set -g @open-S 'https://www.google.com/search?q='


###########################
## Key bindings
############################
# change key or switching between current and last window
# unbind-key -a
bind-key -r l next-window
bind-key -r h previous-window
bind-key s split-pane "tmux list-windows -F '#{window_name}' | fzf | xargs -I {} tmux select-window -t {}"

# rebind pane splitting
unbind-key % #
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# rebind pane resizing
bind-key -r K resize-pane -U 5
bind-key -r J resize-pane -D 5
bind-key -r H resize-pane -L 5
bind-key -r L resize-pane -R 5

# change prefix key to 'a'
unbind C-b
set -g prefix C-a

# rebind copy-mode
unbind-key [
bind-key v copy-mode
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection

# rebind kill commands
unbind-key X
bind-key X confirm-before -p "kill-window #P? (y/n)" kill-window
unbind-key x
bind-key x confirm-before -p "kill-pane #P? (y/n)" kill-pane
unbind-key m
bind-key m run "tmux kill-pane -a -t #{pane_id}"

# always create a new window in the home dir
bind c new-window -c ~

# reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# session management
bind N new-session
bind S display-popup -E "tmux list-sessions -F '#{session_name}' | fzf | xargs tmux switch-client -t"

# --- end key bindings

###########################
## Plugins
############################
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
#set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'claude'

###########################
## Navigation
############################
# vim-tmux-navigator plugin handles C-h/j/k/l pane switching

# C-l for clearing screen (overridden by vim-tmux-navigator)
bind C-l send-keys 'C-l'


###########################
## mouse support - yeah... I know :/
############################
set -g mouse on

set -g status-justify "left"
set -g status "on"
set -g pane-border-lines "double"
setw -g window-status-separator ""

###########################################
# Status Bar
###########################################
# --- Dracula Color Palette ---
# Background: #282a36
# Foreground: #f8f8f2
# Selection:  #44475a
# Comment:    #6272a4
# Cyan:       #8be9fd
# Green:      #50fa7b
# Orange:     #ffb86c
# Pink:       #ff79c6
# Purple:     #bd93f9
# Red:        #ff5555
# Yellow:     #f1fa8c

# Status bar general
set -g status-style 'bg=#282a36 fg=#f8f8f2'
set -g status-interval 5
set -g status-left-length 30

# Left side (Session name)
set -g status-left '#[bg=#bd93f9,fg=#282a36,bold] #S #[bg=#44475a,fg=#bd93f9] '

# Right side (Date and Time)
set -g status-right-length 150
set -g status-right '#[fg=#6272a4]#[bg=#6272a4,fg=#f8f8f2] %Y-%m-%d  %H:%M #[bg=#6272a4,fg=#8be9fd]#[bg=#8be9fd,fg=#282a36,bold] #H '

# Window tabs - Inactive
setw -g window-status-style 'fg=#6272a4,bg=#282a36'
setw -g window-status-format ' #I#[fg=#44475a]:#[fg=#f8f8f2]#W#[fg=#6272a4]#F '

# Window tabs - Active
setw -g window-status-current-style 'fg=#ff79c6,bg=#44475a,bold'
setw -g window-status-current-format '#[fg=#282a36,bg=#ff79c6]#[fg=#282a36,bg=#ff79c6] #I:#W #[fg=#ff79c6,bg=#44475a]'

# Pane borders
set -g pane-border-style 'fg=#44475a'
set -g pane-active-border-style 'fg=#bd93f9'

# Message text
set -g message-style 'bg=#44475a,fg=#8be9fd'


###########################
## Plugin Manager
############################
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
